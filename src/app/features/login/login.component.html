<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="auth-brand__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
      </div>
      <span class="auth-brand__name">SecureGate</span>
    </div>

    <h1 class="auth-card__title">Iniciar sesión</h1>
    <p class="auth-card__subtitle">Ingresa tus credenciales para continuar</p>

    <div *ngIf="error" class="auth-alert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>

    <form (ngSubmit)="onSubmit()">

      <div class="auth-field">
        <label for="email">Correo electrónico</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
          </svg>
          <input id="email" type="email" [(ngModel)]="email" name="email"
                 placeholder="usuario@empresa.com" required />
        </div>
      </div>

      <div class="auth-field">
        <label for="password">Contraseña</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
          <input id="password" type="password" [(ngModel)]="password" name="password"
                 placeholder="••••••••" required />
        </div>
      </div>

      <button type="submit" class="auth-btn" [disabled]="loading">
        <span *ngIf="!loading">Ingresar</span>
        <span *ngIf="loading" class="auth-btn__spinner"></span>
      </button>

    </form>

    <div class="auth-divider"><span>o</span></div>

    <div class="auth-links">
      <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
      <a routerLink="/register">Crear cuenta</a>
    </div>

  </div>
</div>
