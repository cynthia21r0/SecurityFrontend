<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="auth-brand__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
      </div>
      <span class="auth-brand__name">SecureGate</span>
    </div>

    <h1 class="auth-card__title">Iniciar sesión</h1>
    <p class="auth-card__subtitle">Ingresa tus credenciales para continuar</p>

    <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate>

      <div class="auth-field">
        <label for="email">Correo electrónico</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m2 7 10 7 10-7"/>
          </svg>
          <input id="email" type="email" name="email"
                 [(ngModel)]="email" #emailRef="ngModel"
                 placeholder="usuario@empresa.com"
                 required email />
        </div>
        <span class="auth-field__error" *ngIf="emailRef.invalid && emailRef.touched">
          Ingresa un email válido
        </span>
      </div>

      <div class="auth-field">
        <label for="password">Contraseña</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
          <input id="password" name="password"
                 [type]="showPass ? 'text' : 'password'"
                 [(ngModel)]="password" #passRef="ngModel"
                 placeholder="••••••••"
                 required minlength="8" />
          <button type="button" class="auth-input-toggle"
                  (click)="showPass = !showPass">
            <svg *ngIf="!showPass" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPass" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="auth-field__error" *ngIf="passRef.invalid && passRef.touched">
          Mínimo 8 caracteres
        </span>
      </div>

      <button type="submit" class="auth-btn"
              [disabled]="loading || f.invalid">
        <span *ngIf="!loading">Ingresar</span>
        <span *ngIf="loading" class="auth-btn__spinner"></span>
      </button>

    </form>

    <div class="auth-divider"><span>o</span></div>

    <div class="auth-links">
      <a routerLink="/forgot-password">¿Olvidaste tu contraseña?</a>
      <a routerLink="/register">Crear cuenta</a>
    </div>

  </div>
</div>
