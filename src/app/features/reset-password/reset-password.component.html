<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-header">
      <h1>SecureGate</h1>
      <p>Nueva contraseña</p>
    </div>

    <div class="auth-body">

      <div *ngIf="successMsg" class="alert alert-success">
        ✅ {{ successMsg }} Redirigiendo al login...
      </div>

      <div *ngIf="errorMsg" class="alert alert-error">
        ⚠️ {{ errorMsg }}
      </div>

      <form (ngSubmit)="onSubmit()" *ngIf="tokenValid && !successMsg">

        <div class="form-group">
          <label for="pwd">Nueva contraseña</label>
          <input
            id="pwd"
            type="password"
            [(ngModel)]="newPassword"
            name="newPassword"
            placeholder="Mínimo 8 caracteres, 1 mayúscula, 1 número"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirm">Confirmar contraseña</label>
          <input
            id="confirm"
            type="password"
            [(ngModel)]="confirmPwd"
            name="confirmPwd"
            placeholder="Repite la contraseña"
            required
          />
        </div>

        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Guardando...' : 'Restablecer contraseña' }}
        </button>

      </form>

      <div class="auth-links" *ngIf="!tokenValid">
        <a routerLink="/forgot-password">Solicitar nuevo enlace</a>
      </div>

    </div>
  </div>
</div>
