<div class="auth-wrapper">
  <div class="auth-card">

    <div class="auth-brand">
      <div class="auth-brand__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="5" y="11" width="14" height="10" rx="2"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
      </div>
      <span class="auth-brand__name">SecureGate</span>
    </div>

    <h1 class="auth-card__title">Crear cuenta</h1>
    <p class="auth-card__subtitle">Completa los campos para registrarte</p>

    <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate>

      <!-- Username -->
      <div class="auth-field">
        <label for="username">Nombre de usuario</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <input id="username" type="text" name="username"
                 [(ngModel)]="username" #usernameRef="ngModel"
                 placeholder="ej. juan_perez"
                 required minlength="3" />
        </div>
        <span class="auth-field__error"
              *ngIf="usernameRef.invalid && usernameRef.touched">
          Mínimo 3 caracteres
        </span>
      </div>

      <!-- Email -->
      <div class="auth-field">
        <label for="email">Correo electrónico</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m2 7 10 7 10-7"/>
          </svg>
          <input id="email" type="email" name="email"
                 [(ngModel)]="email" #emailRef="ngModel"
                 placeholder="usuario@empresa.com"
                 required email />
        </div>
        <span class="auth-field__error"
              *ngIf="emailRef.invalid && emailRef.touched">
          Ingresa un email válido
        </span>
      </div>

      <!-- Contraseña -->
      <div class="auth-field">
        <label for="password">Contraseña</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
          <input id="password" name="password"
                 [type]="showPass ? 'text' : 'password'"
                 [(ngModel)]="password"
                 placeholder="Mín. 8 caracteres, 1 mayúscula, 1 número"
                 required />
          <button type="button" class="auth-input-toggle"
                  (click)="showPass = !showPass">
            <svg *ngIf="!showPass" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPass" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.8">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>

        <div *ngIf="password.length > 0" class="auth-strength">
          <div class="auth-strength__bars">
            <span class="bar"
                  [class.weak]="passwordStrength === 'weak'"
                  [class.medium]="passwordStrength === 'medium'"
                  [class.strong]="passwordStrength === 'strong'">
            </span>
            <span class="bar"
                  [class.medium]="passwordStrength === 'medium'"
                  [class.strong]="passwordStrength === 'strong'">
            </span>
            <span class="bar"
                  [class.strong]="passwordStrength === 'strong'">
            </span>
          </div>
          <span class="auth-strength__label"
                [class.weak]="passwordStrength === 'weak'"
                [class.medium]="passwordStrength === 'medium'"
                [class.strong]="passwordStrength === 'strong'">
            {{ passwordStrength === 'weak' ? 'Débil'
             : passwordStrength === 'medium' ? 'Media' : 'Fuerte' }}
          </span>
        </div>
      </div>

      <!-- Confirmar contraseña -->
      <div class="auth-field">
        <label for="confirm">Confirmar contraseña</label>
        <div class="auth-input-wrap">
          <svg class="auth-input-icon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.8">
            <rect x="5" y="11" width="14" height="10" rx="2"/>
            <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
          </svg>
          <input id="confirm" type="password" name="confirm"
                 [(ngModel)]="confirm"
                 placeholder="Repite tu contraseña"
                 required />
          <span *ngIf="confirm.length > 0" class="auth-input-check">
            <svg *ngIf="passwordsMatch" viewBox="0 0 24 24" fill="none"
                 stroke="#16a34a" stroke-width="2.5">
              <path d="m5 13 4 4L19 7"/>
            </svg>
            <svg *ngIf="!passwordsMatch" viewBox="0 0 24 24" fill="none"
                 stroke="#dc2626" stroke-width="2.5">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </span>
        </div>
      </div>

      <button type="submit" class="auth-btn"
              [disabled]="loading || f.invalid || !passwordValid || !passwordsMatch">
        <span *ngIf="!loading">Crear cuenta</span>
        <span *ngIf="loading" class="auth-btn__spinner"></span>
      </button>

    </form>

    <div class="auth-divider"><span>o</span></div>

    <div class="auth-links auth-links--center">
      <span>¿Ya tienes cuenta?</span>
      <a routerLink="/login">Inicia sesión</a>
    </div>

  </div>
</div>
